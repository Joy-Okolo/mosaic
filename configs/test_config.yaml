client_tiers:
  tier1_fraction: 0.2
  tier2_fraction: 0.5
  tier3_duty_cycle: 5
  tier3_fraction: 0.3
encoders:
  sensor:
    bidirectional: true
    cnn_channels:
    - 64
    - 128
    - 256
    cnn_kernel: 3
    dropout: 0.2
    embedding_dim: 128
    input_features: 6
    lstm_hidden: 128
    lstm_layers: 2
experiment:
  log_every: 1
  name: mosaic_v1
  output_dir: results/
  seed: 42
federation:
  clients_per_round: 10
  num_clients: 100
  num_rounds: 5
  warmup_rounds: 10
fusion:
  common_dim: 256
  dropout: 0.1
  num_heads: 4
  num_layers: 2
losses:
  lambda_anchor: 0.1
  mu_prox: 0.01
  tau_aggregation: 0.5
  tau_contrastive: 0.3
mcat:
  alpha: 0.3
  beta: 0.4
  gamma: 0.3
task:
  head_hidden_dim: 128
  num_classes: 6
training:
  batch_size: 32
  learning_rate: 0.01
  local_epochs: 2
  weight_decay: 0.0001
